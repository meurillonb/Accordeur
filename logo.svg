        fill="#1a1a2e" stroke="#f5a623" stroke-width="2.5" stroke-linejoin="round"/>
  
  <!-- Graduations en arc dans la partie haute -->
  <line x1="42" y1="74" x2="50" y2="78" stroke="#ef4444" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <line x1="48" y1="60" x2="56" y2="66" stroke="#ef4444" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="60" y1="48" x2="66" y2="56" stroke="#f5a623" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="76" y1="40" x2="79" y2="50" stroke="#f5a623" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <line x1="96" y1="36" x2="96" y2="48" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="116" y1="40" x2="113" y2="50" stroke="#f5a623" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <line x1="132" y1="48" x2="126" y2="56" stroke="#f5a623" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="144" y1="60" x2="136" y2="66" stroke="#ef4444" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="150" y1="74" x2="142" y2="78" stroke="#ef4444" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  
  <!-- Pivot de l'aiguille -->
  <circle cx="96" cy="108" r="6" fill="#f5a623"/>
  <circle cx="96" cy="108" r="3" fill="#060609"/>
  
  <!-- Aiguille -->
  <line x1="96" y1="108" x2="96" y2="50" stroke="#f5a623" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Halo vert graduation juste -->
  <circle cx="96" cy="36" r="4" fill="#22c55e" opacity="0.3"/>
