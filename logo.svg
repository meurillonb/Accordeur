<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <!-- Fond -->
  <rect fill="#060609" width="192" height="192" rx="32"/>
  
  <!-- Médiator : triangle arrondi, large en haut, pointe en bas -->
