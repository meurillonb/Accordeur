<!DOCTYPE html>

<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5.0" />
  <meta name="theme-color" content="#0a0a0f" />
  <meta name="color-scheme" content="dark light" />
  <meta name="description" content="GuitarTune - Accordeur guitare chromatique avec détection d'accord AI. Fonctionne hors ligne." />
  <meta name="keywords" content="accordeur, guitare, tuner, musique, offline, pwa" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="GuitarTune" />
  <meta name="application-name" content="GuitarTune" />
  <meta name="msapplication-TileColor" content="#0a0a0f" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/svg+xml" href="logo.svg" />
  <link rel="apple-touch-icon" href="logo.svg" />
  <link rel="manifest" href="manifest.json" />
  <title>GuitarTune — Accordeur</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Playfair+Display:ital,wght@1,400;1,700&display=swap"
    rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            'bg-primary': '#060609',
            'bg-secondary': '#0e0e16',
            'bg-tertiary': '#14141f',
            'border-subtle': 'rgba(255, 255, 255, 0.07)',
            'border-bright': 'rgba(255, 255, 255, 0.15)',
            'accent-amber': '#f5a623',
            'accent-amber-dim': '#a36a10',
            'accent-green': '#22c55e',
            'accent-red': '#ef4444',
            'text-primary': '#e8e8f0',
            'text-dim': '#6b6b80',
            'text-muted': '#3a3a50'
          },
          fontFamily: {
            'mono': ['DM Mono', 'monospace'],
            'display': ['Syncopate', 'sans-serif'],
            'serif': ['Playfair Display', 'serif']
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="style.css" />
</head>

<body class="h-screen bg-bg-primary text-text-primary font-mono overflow-hidden">
  <div id="root" class="h-full flex flex-col">

    <header class="bg-bg-secondary/50 backdrop-blur-sm border-b border-border-subtle px-4 py-3">
      <div class="logo flex items-center gap-2">
        <img src="logo.svg" alt="GuitarTune" width="28" height="28" class="logo-icon" />
        <span class="font-display text-xl font-bold text-accent-amber tracking-wide">Guitar Tune</span>
      </div>
    </header>

    <div class="main-display flex-1 p-4 bg-gradient-to-b from-bg-secondary/30 to-transparent">
      <div class="note-container bg-bg-secondary/70 backdrop-blur-sm rounded-2xl p-6 mb-6 border border-border-subtle">
        <div class="flex items-center justify-between">
          <div class="note-label text-center">
            <div class="lang text-sm text-text-dim mb-2">Français</div>
            <div class="note-name idle text-3xl font-bold text-accent-amber" id="note-fr">—</div>
          </div>
          <div class="divider w-px h-16 bg-border-subtle"></div>
          <div class="freq-display text-center">
            <div class="freq-value text-2xl font-mono font-medium" id="freq-val">— —</div>
            <div class="freq-unit text-sm text-text-dim mt-1">Hz</div>
          </div>
          <div class="divider w-px h-16 bg-border-subtle"></div>
          <div class="note-label text-center">
            <div class="lang text-sm text-text-dim mb-2">English</div>
            <div class="note-name idle text-3xl font-bold text-accent-amber" id="note-us">—</div>
          </div>
        </div>
      </div>

      <div class="gauge-wrap bg-bg-tertiary/50 rounded-xl p-4 mb-4">
        <div class="gauge-label-row flex justify-between text-xs text-text-dim mb-3">
          <span class="flex items-center gap-1">♭ <span class="hidden sm:inline">BÉMOL</span></span>
          <span class="font-medium text-accent-green">JUSTE</span>
          <span class="flex items-center gap-1">♯ <span class="hidden sm:inline">DIÈSE</span></span>
        </div>
        <div class="gauge relative bg-bg-primary/60 rounded-full" style="height: 6px;">
          <div class="gauge-track absolute inset-0 rounded-full bg-gradient-to-r from-accent-red via-accent-green to-accent-red opacity-50"></div>
          <div class="gauge-center absolute left-1/2 -translate-x-1/2" style="top: -5px; bottom: -5px; width: 2px; background: var(--accent-green); border-radius: 2px; opacity: 0.6;"></div>
          <div class="gauge-needle absolute" id="needle" style="left:50%; top: -8px; width: 4px; height: 22px; border-radius: 2px; background: var(--text-muted); transform: translateX(-50%); transition: left 0.15s ease-out, background-color 0.2s ease;"></div>
        </div>
      </div>

      <!-- Waveform juste après la gauge pour cohérence visuelle -->
      <div class="waveform-section mb-2">
        <div class="waveform-wrap h-10 bg-bg-secondary/30 rounded-lg overflow-hidden mx-4">
          <canvas id="waveform" class="w-full h-full"></canvas>
        </div>
      </div>

      <div class="status-row flex items-center justify-between bg-bg-secondary/30 rounded-lg px-4 py-3 mx-4">
        <div class="flex items-center gap-3">
          <div class="status-dot w-3 h-3 rounded-full bg-text-muted" id="status-dot"></div>
          <span class="status-text text-sm font-medium" id="status-text">Inactif</span>
        </div>
        <span class="cents-display text-sm font-mono" id="cents-display"></span>
      </div>

      <!-- Zone de debug (masquée par défaut) -->
      <div id="debug-panel" class="bg-bg-tertiary/50 rounded-lg p-3 mt-4 text-xs font-mono hidden mx-4">
        <div class="text-accent-amber font-bold mb-2">🔧 Debug Info</div>
        <div class="grid grid-cols-2 gap-2 text-text-dim">
          <div>Frequency: <span id="debug-freq" class="text-text-primary">-</span></div>
          <div>Method: <span id="debug-method" class="text-text-primary">-</span></div>
          <div>RMS Level: <span id="debug-rms" class="text-text-primary">-</span></div>
          <div>Buffer Size: <span id="debug-buffer" class="text-text-primary">-</span></div>
        </div>
      </div>

    </div>

    <div class="strings-section px-4 mb-6">
      <div class="strings-label text-center text-sm text-text-dim mb-3 font-medium tracking-wide">Cordes Standard — E A D G B e</div>
      <div class="strings-grid grid grid-cols-6 gap-2" id="strings-grid"></div>
    </div>

    <!-- Contrôle microphone centré -->
    <div class="mic-section px-4 mb-3">
      <div class="flex justify-center">
        <div class="mic-container flex flex-col items-center">
          <button class="mic-btn w-14 h-14 bg-accent-amber/20 active:bg-accent-amber/40 backdrop-blur-sm border-2 border-accent-amber/40 rounded-full flex items-center justify-center text-3xl transition-all duration-200 transform active:scale-95 shadow-lg" id="mic-btn" title="Activer le microphone">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="mic-icon">
              <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path>
              <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
              <line x1="12" y1="19" x2="12" y2="23"></line>
              <line x1="8" y1="23" x2="16" y2="23"></line>
            </svg>
          </button>
          <div class="mic-label text-xs text-center mt-2 font-medium" id="mic-label">Écouter</div>
        </div>
      </div>
    </div>

    <div class="chromatic-section px-4 mb-4">
      <div class="chromatic-label text-center text-sm text-text-dim mb-3 font-medium tracking-wide">Gamme Chromatique</div>
      <div class="chromatic-grid grid grid-cols-6 sm:grid-cols-12 gap-2" id="chromatic-grid"></div>
    </div>

    <!-- <footer class="bg-bg-secondary/30 backdrop-blur-sm border-t border-border-subtle px-4 py-3 flex items-center justify-between text-xs text-text-dim mt-auto">
      <div class="flex items-center gap-2">
        <span class="online-indicator w-2 h-2 rounded-full bg-accent-green" id="online-indicator"></span>
        <span class="hidden sm:inline" id="footer-text">GuitarTune PWA · A440 · Equal Temperament</span>
        <span class="sm:hidden" id="footer-text">GuitarTune PWA</span>
      </div>
      <div class="text-xs text-text-muted">
        <a href="?debug=true" class="hover:text-accent-amber transition-colors">Debug Mode</a>
        <span class="mx-1">•</span>
        <a href="test-audio.html" target="_blank" class="hover:text-accent-amber transition-colors">Test Audio</a>
      </div> 
    </footer> -->

  </div>

  <script src="https://cdn.jsdelivr.net/npm/essentia.js@0.1.3/dist/essentia.js-core.js"></script>
  <script src="pitch-detection.js" defer></script>
  <script src="platform-ios.js" defer></script>
  <script src="platform-android.js" defer></script>
  <script src="platform-desktop.js" defer></script>
  <script src="platform-common.js" defer></script>
  <script src="app.js" defer></script>
</body>

</html>
